name: Build and Deploy LaTeX Resume

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: 🛠️ Build & Deploy Resume
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🔄 Sync data.json
        run: python sync_resume.py

      - name: 🧠 Check for changes
        id: check
        run: |
          SYNC_CHANGED=$(git diff HEAD --name-only src/sections/ | grep -E '\.tex$' || true)
          
          if [ "${{ github.event_name }}" == "push" ]; then
            PUSH_CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '\.tex$|sections/' || true)
            CHANGED=$(echo -e "$PUSH_CHANGED\n$SYNC_CHANGED" | grep -v '^$' | sort -u)
          else
            CHANGED="$SYNC_CHANGED"
          fi
          
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: 🧱 Build PDF
        if: steps.check.outputs.has_changes == 'true'
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume.tex
          working_directory: src

      - name: 📦 Stage and prepare PR
        if: steps.check.outputs.has_changes == 'true'
        run: |
          mkdir -p docs
          mv src/resume.pdf docs/resume.pdf
          git add -A src/sections/ docs/resume.pdf

      - name: 📅 Generate date
        if: steps.check.outputs.has_changes == 'true'
        id: date
        run: echo "date=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: 📝 Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            [GA] Update resume - ${{ steps.date.outputs.date }} [skip ci]
            
            - Sections synced from data.json
            - PDF rebuilt
          title: "[GA] Update resume - ${{ steps.date.outputs.date }}"
          body: |
            Automated update of resume from GitHub Actions
            
            - Sections synced from data.json
            - PDF rebuilt with latest data
          branch: update-resume
          delete-branch: true
          assignees: MarcusCJH
          reviewers: MarcusCJH
          author: Marcus Chan <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          committer: Marcus Chan <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
